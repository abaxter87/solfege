<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function getCtx() {
  if (!ctx) ctx = new AudioContext();
  return ctx;
}

let audioReady = false;
let pendingMidi = null;

async function unlockAudio() {
  const ac = getCtx();
  try {
    if (ac.state === 'suspended' || ac.state === 'interrupted') {
      await ac.resume();
    }

    // iPhone/Safari can require a real audio node to start once after resume.
    const buffer = ac.createBuffer(1, 1, ac.sampleRate || 44100);
    const source = ac.createBufferSource();
    const gain = ac.createGain();
    gain.gain.value = 0.00001;
    source.buffer = buffer;
    source.connect(gain);
    gain.connect(ac.destination);
    source.start(0);
  } catch (e) {
    // leave audioReady false if resume/unlock is blocked
  }

  audioReady = (ac.state === 'running');

  if (audioReady && pendingMidi !== null) {
    const m = pendingMidi;
    pendingMidi = null;
    playNote(m);
  }
  return audioReady;
}

// Try to unlock on the first real interaction.
window.addEventListener('pointerdown', () => { unlockAudio(); }, { once: true });
window.addEventListener('touchstart', () => { unlockAudio(); }, { once: true, passive: true });
window.addEventListener('mousedown', () => { unlockAudio(); }, { once: true });


// 88 keys: A0 (MIDI 21) to C8 (MIDI 108)
const MIDI_START = 21;
const MIDI_END = 108;
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_BLACK = [false,true,false,true,false,false,true,false,true,false,true,false];

// Solfège syllables
// Prefer sharps (what this file originally did)
const SOL_SHARP = ['Do','Di','Re','Ri','Mi','Fa','Fi','Sol','Si','La','Li','Ti'];

// Prefer flats (enharmonic spellings)
const SOL_FLAT  = ['Do','Ra','Re','Me','Mi','Fa','Se','Sol','Le','La','Te','Ti'];

// Fixed Do syllables (C = Do always, with sharps/flats preference)

let accidentalMode = (localStorage.getItem('accidentalMode') || 'both'); // sharp | flat | both
// Apply persisted/default selection
try { document.getElementById('accSelect').value = accidentalMode; } catch(e) {}

let tonic = 0; // semitone offset for C
let displayMode = 'solfege'; // solfege | fixed | note

const KEY_DATA = {
  // Major
  'C:maj':  { tonic: 0,  sigType: 'none',  sigCount: 0, label: 'C Major' },
  'G:maj':  { tonic: 7,  sigType: 'sharp', sigCount: 1, label: 'G Major' },
  'D:maj':  { tonic: 2,  sigType: 'sharp', sigCount: 2, label: 'D Major' },
  'A:maj':  { tonic: 9,  sigType: 'sharp', sigCount: 3, label: 'A Major' },
  'E:maj':  { tonic: 4,  sigType: 'sharp', sigCount: 4, label: 'E Major' },
  'B:maj':  { tonic: 11, sigType: 'sharp', sigCount: 5, label: 'B Major' },
  'F#:maj': { tonic: 6,  sigType: 'sharp', sigCount: 6, label: 'F# Major' },
  'C#:maj': { tonic: 1,  sigType: 'sharp', sigCount: 7, label: 'C# Major' },
  'F:maj':  { tonic: 5,  sigType: 'flat',  sigCount: 1, label: 'F Major' },
  'Bb:maj': { tonic: 10, sigType: 'flat',  sigCount: 2, label: 'Bb Major' },
  'Eb:maj': { tonic: 3,  sigType: 'flat',  sigCount: 3, label: 'Eb Major' },
  'Ab:maj': { tonic: 8,  sigType: 'flat',  sigCount: 4, label: 'Ab Major' },
  'Db:maj': { tonic: 1,  sigType: 'flat',  sigCount: 5, label: 'Db Major' },
  'Gb:maj': { tonic: 6,  sigType: 'flat',  sigCount: 6, label: 'Gb Major' },
  'Cb:maj': { tonic: 11, sigType: 'flat',  sigCount: 7, label: 'Cb Major' },

  // Minor (same key signatures as relative majors)
  'A:min':  { tonic: 9,  sigType: 'none',  sigCount: 0, label: 'A Minor' },
  'E:min':  { tonic: 4,  sigType: 'sharp', sigCount: 1, label: 'E Minor' },
  'B:min':  { tonic: 11, sigType: 'sharp', sigCount: 2, label: 'B Minor' },
  'F#:min': { tonic: 6,  sigType: 'sharp', sigCount: 3, label: 'F# Minor' },
  'C#:min': { tonic: 1,  sigType: 'sharp', sigCount: 4, label: 'C# Minor' },
  'G#:min': { tonic: 8,  sigType: 'sharp', sigCount: 5, label: 'G# Minor' },
  'D#:min': { tonic: 3,  sigType: 'sharp', sigCount: 6, label: 'D# Minor' },
  'A#:min': { tonic: 10, sigType: 'sharp', sigCount: 7, label: 'A# Minor' },

  'D:min':  { tonic: 2,  sigType: 'flat',  sigCount: 1, label: 'D Minor' },
  'G:min':  { tonic: 7,  sigType: 'flat',  sigCount: 2, label: 'G Minor' },
  'C:min':  { tonic: 0,  sigType: 'flat',  sigCount: 3, label: 'C Minor' },
  'F:min':  { tonic: 5,  sigType: 'flat',  sigCount: 4, label: 'F Minor' },
  'Bb:min': { tonic: 10, sigType: 'flat',  sigCount: 5, label: 'Bb Minor' },
  'Eb:min': { tonic: 3,  sigType: 'flat',  sigCount: 6, label: 'Eb Minor' },
  'Ab:min': { tonic: 8,  sigType: 'flat',  sigCount: 7, label: 'Ab Minor' },
};

function getSelectedKeyData() {
  const v = document.getElementById('tonicSelect').value;
  return KEY_DATA[v] || KEY_DATA['C:maj'];
}

function getLabel(midi) {
  const semitone = midi % 12;
  const noteName = NOTE_NAMES[semitone];
  const oct = Math.floor(midi / 12) - 1;

  if (displayMode === 'note') return noteName + oct;

  // Helper to format sharp/flat/both
  const fmt = (sharpArr, flatArr, idx) => {
    if (accidentalMode === 'sharp') return sharpArr[idx];
    if (accidentalMode === 'flat') return flatArr[idx];

    // both: show pairs only for chromatic degrees that differ
    const s = sharpArr[idx];
    const f = flatArr[idx];
    return (s === f) ? s : `${s}/${f}`;
  };
  // movable do
  const deg = ((semitone - tonic) % 12 + 12) % 12;
  return fmt(SOL_SHARP, SOL_FLAT, deg);
}


const activeOscillators = {};

function playNote(midi) {
  const ac = getCtx();
  if (ac.state !== 'running') {
    pendingMidi = midi;
    unlockAudio();
    return;
  }

  const now = ac.currentTime;
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  const osc1 = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const gain = ac.createGain();
  const comp = ac.createDynamicsCompressor();

  osc1.type = 'triangle';
  osc2.type = 'sine';

  osc1.frequency.setValueAtTime(freq, now);
  osc2.frequency.setValueAtTime(freq * 2, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.30, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 1.4);

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(comp);
  comp.connect(ac.destination);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + 1.45);
  osc2.stop(now + 1.45);

  activeOscillators[midi] = { osc1, osc2, gain };
}

function stopNote(midi) {
  // notes auto-stop via envelope
}

// Build piano
const pianoEl = document.getElementById('piano');
let whiteIndex = 0;
const keyEls = {}; // midi -> element

// We'll render white keys as flex, black keys absolutely positioned
// Track white key positions
const whiteKeys = [];
const blackKeys = [];

for (let m = MIDI_START; m <= MIDI_END; m++) {
  const sem = m % 12;
  const isBlack = IS_BLACK[sem];
  if (!isBlack) whiteKeys.push(m);
  else blackKeys.push(m);
}

// Create container with relative positioning
const container = document.createElement('div');
container.style.position = 'relative';
container.style.display = 'flex';
pianoEl.appendChild(container);

// White keys
const whiteKeyEls = {};
whiteKeys.forEach((m, i) => {
  const el = document.createElement('div');
  el.className = 'white-key';
  el.dataset.midi = m;
  
  const sem = m % 12;
  const oct = Math.floor(m / 12) - 1;
  
  // Octave label on C
  if (sem === 0) {
    const ol = document.createElement('span');
    ol.className = 'octave-label';
    ol.textContent = oct;
    el.appendChild(ol);
  }
  const lbl = document.createElement('div');
  lbl.className = 'key-label';
  lbl.textContent = getLabel(m);
  el.appendChild(lbl);
  
  attachPointerHandlers(el, m);
  container.appendChild(el);
  whiteKeyEls[m] = el;
  keyEls[m] = el;
});

// Black keys — positioned absolutely
// We need to know each white key's pixel position
// Each white key is 34px wide
const WHITE_W = 40;
const BLACK_W = 26;

// Map: for each black key midi, find its visual position
// Between which two white keys does it sit?
blackKeys.forEach(m => {
  const sem = m % 12;
  // Find the white key index just before this black key
  // White keys up to this midi
  const whitesBefore = whiteKeys.filter(wm => wm < m).length;
  const leftPos = whitesBefore * WHITE_W - BLACK_W / 2;
  
  const el = document.createElement('div');
  el.className = 'black-key';
  el.dataset.midi = m;
  el.style.left = leftPos + 'px';
  el.style.top = '0';
  el.style.position = 'absolute';
  
  const lbl = document.createElement('div');
  lbl.className = 'key-label';
  lbl.textContent = getLabel(m);
  el.appendChild(lbl);
  
  attachPointerHandlers(el, m);
  container.appendChild(el);
  keyEls[m] = el;
});

// Set container width
container.style.width = (whiteKeys.length * WHITE_W) + 'px';
container.style.height = '160px';
/* ===== Staff strip markers (treble clef) =====
   Goal: give a clear, scrolling reference for octave changes and Middle C.
   We mark every C with an octave label (C1, C2, ...), and highlight Middle C (C4).
*/
const staffStrip = document.getElementById('staffStrip');
const staffNotes = document.getElementById('staffNotes');

function buildStaffMarkers() {
  // Match staff width to the keyboard width
  staffStrip.style.width = (whiteKeys.length * WHITE_W) + 'px';

  // Clear existing markers
  staffNotes.innerHTML = '';

  // Find each C (white key) and place a marker at its center
  whiteKeys.forEach((m, wi) => {
    if ((m % 12) !== 0) return; // C only
    const oct = Math.floor(m / 12) - 1; // MIDI octave
    const x = wi * WHITE_W + (WHITE_W / 2);

    const marker = document.createElement('div');
    marker.className = 'c-marker' + (m === 60 ? ' middle' : '');
    marker.style.left = x + 'px';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = (m === 60) ? 'Middle C (C4)' : `C${oct}`;

    const tick = document.createElement('div');
    tick.className = 'tick';

    marker.appendChild(label);
    marker.appendChild(tick);

    // Add a tiny ledger-line notehead for Middle C only (subtle but clear)
    if (m === 60) {
      const noteWrap = document.createElement('div');
      noteWrap.className = 'note';
      noteWrap.innerHTML = `
        <svg width="44" height="18" viewBox="0 0 44 18" aria-hidden="true">
          <line x1="6" x2="38" y1="10" y2="10"></line>
          <ellipse cx="22" cy="10" rx="7" ry="4.6"></ellipse>
        </svg>
      `;
      marker.appendChild(noteWrap);
    }

    staffNotes.appendChild(marker);
  });
}

function triggerKey(midi, on) {
  const el = keyEls[midi];
  if (!el) return;
  if (on) {
    el.classList.add('active');
    playNote(midi);
  } else {
    el.classList.remove('active');
  }
}

// ===== Polyphonic multi-touch support (pointer events) =====
const pointerToMidi = new Map();

function attachPointerHandlers(el, midi) {
  // Ensure iOS devices that don't fully support Pointer Events still work (touch + mouse fallbacks).
  const begin = (id) => {
    // Unlock audio *inside* the same user gesture that starts the note.
    unlockAudio();
    pointerToMidi.set(id, midi);
    triggerKey(midi, true);
  };

  const endNote = (id) => {
    const m = pointerToMidi.get(id);
    if (m !== undefined) triggerKey(m, false);
    pointerToMidi.delete(id);
  };

  // Pointer Events (modern browsers)
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    try { el.setPointerCapture(e.pointerId); } catch {}
    begin(e.pointerId);
  });

  el.addEventListener('pointerup', (e) => {
    e.preventDefault();
    endNote(e.pointerId);
    try { el.releasePointerCapture(e.pointerId); } catch {}
  });

  el.addEventListener('pointercancel', (e) => endNote(e.pointerId));

  // Touch fallback (older iOS / embedded browsers)
  el.addEventListener('touchstart', (e) => {
    // Not passive so we can prevent scrolling/zooming while playing.
    e.preventDefault();
    for (const t of Array.from(e.changedTouches)) {
      begin('t' + t.identifier);
    }
  }, { passive: false });

  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    for (const t of Array.from(e.changedTouches)) {
      endNote('t' + t.identifier);
    }
  }, { passive: false });

  el.addEventListener('touchcancel', (e) => {
    for (const t of Array.from(e.changedTouches)) {
      endNote('t' + t.identifier);
    }
  });

  // Mouse fallback (desktop)
  el.addEventListener('mousedown', (e) => {
    // Avoid duplicate notes when Pointer Events are already firing.
    if (window.PointerEvent) return;
    e.preventDefault();
    begin('m');
  });

  el.addEventListener('mouseup', (e) => {
    if (window.PointerEvent) return;
    e.preventDefault();
    endNote('m');
  });

  el.addEventListener('mouseleave', () => {
    if (window.PointerEvent) return;
    endNote('m');
  });
}
function updateLabels() {
  for (let m = MIDI_START; m <= MIDI_END; m++) {

  }
}

// Key signature preview (treble clef)
const keySigTreble = document.getElementById('keySigTreble');
const keySigBass = document.getElementById('keySigBass');

function clearSvg(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}

// Y positions for accidentals on treble staff (approx; looks like normal sheet music)
const SHARP_ORDER = ['F','C','G','D','A','E','B'];
const FLAT_ORDER  = ['B','E','A','D','G','C','F'];

// Map pitch letter to y coordinate on our staff (top line to bottom line)
/*
  Y positions for key-signature accidentals on a treble staff.
  Staff lines are at y = 18, 26, 34, 42, 50 (top to bottom).
*/
const SHARP_Y = [18, 30, 14, 26, 38, 22, 34]; // F C G D A E B (treble positions)
// Treble clef key-signature flats (order: Bb, Eb, Ab, Db, Gb, Cb, Fb).
// Fb must sit on the top line (F) — i.e., y=18 for this staff.
const FLAT_Y  = [33, 21, 37, 25, 41, 29, 18];
/*
  Bass clef key-signature positions (standard engraving).
  Staff lines are at y = 18, 26, 34, 42, 50 (top → bottom).

  Bass staff note names (bottom → top):
    Lines:  G(50), B(42), D(34), F(26), A(18)
    Spaces: A(46), C(38), E(30), G(22)

  Sharps order: F C G D A E B
  Flats  order: B E A D G C F
*/
const BASS_SHARP_Y = [26, 38, 22, 34, 46, 30, 42]; // F C G D A E B
const BASS_FLAT_Y  = [42, 30, 46, 34, 50, 38, 26]; // B E A D G C F


function updateKeySigPreview() {
  const kd = getSelectedKeyData();
  clearSvg(keySigTreble);
  clearSvg(keySigBass);

  const drawStaff = (svg, clefGlyph, showLabel) => {
    // Draw staff lines
    const x0 = 10, x1 = 170;
    const lines = [18, 26, 34, 42, 50];
    for (const y of lines) {
      svg.appendChild(svgEl('line', { x1: x0, y1: y, x2: x1, y2: y, class: 'staff-line' }));
    }

    // Clef
    const clefY = (svg === keySigBass) ? 50 : 55;
    const clef = svgEl('text', { x: 16, y: clefY, class: 'clef' });
    clef.textContent = clefGlyph;
    svg.appendChild(clef);

    if (showLabel) {
      const label = svgEl('text', { x: 12, y: 14, class: 'keylabel' });
      label.textContent = kd.label;
      svg.appendChild(label);
    }

    // Accidentals
    const accType = kd.sigType;
    const count = kd.sigCount;
    if (accType === 'none' || count === 0) return;

    const glyph = accType === 'sharp' ? '♯' : '♭';
    const yList = (svg === keySigTreble)
      ? (accType === 'sharp' ? SHARP_Y : FLAT_Y)
      : (accType === 'sharp' ? BASS_SHARP_Y : BASS_FLAT_Y);

    // Place the whole key-signature group closer to the clef (not right-aligned).
    // Keep it safely inside the staff box by slightly compressing spacing if needed.
    const maxX = 168;          // right edge of the drawable area
    // Start just after the clef, but if the treble label is long, push the accidentals right
    // so they don't overlap the key name (e.g., C# Major, Gb Major).
    let minStart = 56;
    if (showLabel && svg === keySigTreble) {
      // Keep accidentals from overlapping the key label, but avoid pushing them too far right.
      // Prefer measured SVG text width when available; otherwise use a conservative estimate.
      const labelEl = svg.querySelector('.keylabel');
      let labelW = 0;
      try {
        if (labelEl && typeof labelEl.getComputedTextLength === 'function') {
          labelW = labelEl.getComputedTextLength();
        }
      } catch (e) {}
      if (!labelW) {
        // Conservative estimate (px) tuned for the current font sizes.
        labelW = (kd.label || '').length * 8.5;
      }
      minStart = Math.max(minStart, 12 + labelW + 10);
    }
    const maxSpacing = (count >= 6) ? 12 : 14;
    const minSpacing = 10;

    // Clamp start so the group doesn't hug/overflow the right edge.
    if (count > 1) {
      minStart = Math.min(minStart, maxX - (count - 1) * minSpacing);
    } else {
      minStart = Math.min(minStart, maxX - 2);
    }

    let spacing = maxSpacing;
    if (count > 1) {
      const available = maxX - minStart;
      const needed = (count - 1) * spacing;
      if (needed > available) spacing = Math.max(minSpacing, available / (count - 1));
    }

    let x = minStart;
    for (let i = 0; i < count; i++) {
      const y = yList[i];
      const t = svgEl('text', { x: x, y: y, class: 'acc' });
      t.textContent = glyph;
      svg.appendChild(t);
      x += spacing;
    }
  };

  drawStaff(keySigTreble, '𝄞', true);
  drawStaff(keySigBass, '𝄢', false);
}

    return id;
  }

  function pressRenderedKey(midi, hold, pointerId){
    const el = document.querySelector('[data-midi="' + midi + '"]');
    if (!el) return;

    if (window.PointerEvent) {
      const down = new PointerEvent('pointerdown', {
        bubbles: true,
        pointerId: pointerId,
        pointerType: 'mouse',
        button: 0,
        isPrimary: true
      });
      el.dispatchEvent(down);

      activeWarmupKeys.push({el, pointerId});

      queue(() => {
        try{
          const up = new PointerEvent('pointerup', {
            bubbles: true,
            pointerId: pointerId,
            pointerType: 'mouse',
            button: 0,
            isPrimary: true
          });
          el.dispatchEvent(up);
        } catch(e) {}
        activeWarmupKeys = activeWarmupKeys.filter(k => !(k.el === el && k.pointerId === pointerId));
      }, hold);
    } else {
      const down = new MouseEvent('mousedown', { bubbles: true, button: 0 });
      el.dispatchEvent(down);

      activeWarmupKeys.push({el, pointerId});

      queue(() => {
        try{
          const up = new MouseEvent('mouseup', { bubbles: true, button: 0 });
          el.dispatchEvent(up);
        } catch(e) {}
        activeWarmupKeys = activeWarmupKeys.filter(k => !(k.el === el && k.pointerId === pointerId));
      }, hold);
    }
  }

  function resumeAudioNow(){
    try{
      if (typeof unlockAudio === 'function') unlockAudio();
    } catch(e) {}
    try{
      if (typeof getCtx === 'function'){
        const ac = getCtx();
        if (ac && ac.state !== 'running' && ac.resume) ac.resume();
      }
    } catch(e) {}
  }

  
  const SKIP_KEYS = [
    "C#","C# major","F#","F# major","Cb","Cb major",
    "A#","A# minor","D#","D# minor","Ab","Ab minor"
  ];

  function advanceTonic(){
    const sel = document.getElementById('tonicSelect');
    if (!sel) return;

    let idx = sel.selectedIndex;

    for(let i=0;i<sel.options.length;i++){
      idx = (idx + 1) % sel.options.length;
      const opt = sel.options[idx];
      const label = (opt.value || opt.text || "").trim();

      if(!SKIP_KEYS.includes(label)){
        sel.selectedIndex = idx;
        sel.dispatchEvent(new Event('change',{bubbles:true}));
        break;
      }
    }
  }

  function playWarmupCycle(sessionId){
    if (!warmupRunning || sessionId !== warmupSession) return;

    resumeAudioNow();

    const baseMidi = 60 + window.__warmupOctaveShift + (typeof tonic !== 'undefined' ? tonic : 0);
    let t = 0;
    let pid = 7000 + (sessionId * 100);

    ASC.forEach((off, i) => {
      const midi = baseMidi + off;
      const hold = (i === ASC.length - 1) ? LONG_HOLD : SHORT_HOLD;
      const thisPid = pid++;
      queue(() => pressRenderedKey(midi, hold, thisPid), t);
      t += BEAT;
    });

    t += LONG_HOLD - BEAT;
    t += BEAT * 0.25;

    DESC.forEach((off) => {
      const midi = baseMidi + off;
      const thisPid = pid++;
      queue(() => pressRenderedKey(midi, SHORT_HOLD, thisPid), t);
      t += BEAT;
    });

    queue(() => {
      if (!warmupRunning || sessionId !== warmupSession) return;
      advanceTonic();
      playWarmupCycle(sessionId);
    }, t + SHORT_HOLD + 50);
  }

  function playWarmup(){
    stopWarmup();
    warmupRunning = true;
    const sessionId = warmupSession;
    playWarmupCycle(sessionId);
  }

  function restartWarmupAtShift(shift){
    window.__warmupOctaveShift = shift;
    updateWarmupOctaveButtons();
    stopWarmup();
    setTimeout(() => { playWarmup(); }, 0);
  }

  window.stopWarmup = stopWarmup;
  window.playWarmup = playWarmup;
  window.restartWarmupAtShift = restartWarmupAtShift;

  // Resume audio on any fresh interaction after Safari suspends it.
  ['pointerdown','touchstart','mousedown','keydown'].forEach(evt => {
    window.addEventListener(evt, resumeAudioNow, { passive: true });
  });

  // Stop warm-up on real user interaction with keys or tonic dropdown.
  function shouldStopFromEvent(e){
    if (!e.isTrusted) return false;
    const t = e.target;
    if (!t) return false;
    if (t.id === 'warmupBtn' || (typeof t.closest === 'function' && t.closest('#warmupBtn'))) return false;
    if (t.id === 'tonicSelect' || (typeof t.closest === 'function' && t.closest('#tonicSelect'))) return true;
    if ((typeof t.closest === 'function' && t.closest('.white-key, .black-key, [data-midi]'))) return true;
    if (e.type === 'keydown') return true;
    return false;
  }

  ['pointerdown','touchstart','mousedown','change','input','keydown'].forEach(evt => {
    document.addEventListener(evt, (e) => {
      if (shouldStopFromEvent(e)) stopWarmup();
    }, true);
  });

  // Stop warm-up when page/app is backgrounded; resume audio when visible again.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopWarmup();
      try{
        if (typeof getCtx === 'function'){
          const ac = getCtx();
          if (ac && ac.state === 'running' && ac.suspend) ac.suspend();
        }
      } catch(e) {}
    } else {
      resumeAudioNow();
    }
  });

  window.addEventListener('pagehide', stopWarmup);
  window.addEventListener('blur', () => {
    if (document.hidden) stopWarmup();
  });

  window.addEventListener('load', () => {
    let btn = document.getElementById('warmupBtn');
    if(!btn){
      const controls = document.querySelector('.controls') || document.body;
      btn = document.createElement('button');
      btn.id = 'warmupBtn';
      btn.textContent = 'Broken Thirds Warm-up';
      btn.style.marginLeft = '8px';
      btn.style.padding = '6px 18px';
      controls.appendChild(btn);
    }
    btn.onclick = playWarmup;
  });
})();
</script>


<script>
(function(){
  function scrollKeyboardToMidi(midi){
    try{
      const wrap = document.getElementById('scrollWrap');
      const key = document.querySelector('[data-midi="' + midi + '"]');
      if (!wrap || !key) return;

      const wrapRect = wrap.getBoundingClientRect();
      const keyRect = key.getBoundingClientRect();
      const left = (keyRect.left - wrapRect.left) + wrap.scrollLeft;
      const target = Math.max(0, left - (wrap.clientWidth * 0.15));

      wrap.scrollTo({ left: target, behavior: 'smooth' });
    } catch(e) {}
  }

  window.scrollKeyboardToMidi = scrollKeyboardToMidi;

  window.addEventListener('load', () => {
    setTimeout(() => { scrollKeyboardToMidi(60); }, 100);
  });
})();
</script>
