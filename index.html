  .white-key {

    padding-bottom: 6px;

    z-index: 1;
    user-select: none;
  }
  .white-key:hover { background: linear-gradient(to bottom, #e8e8ff, #f0f0ff); }

  .black-key {

/* Subtle Middle C notation marker */
.middle-c-marker {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;    touch-action: none;
  }

.middle-c-marker line {
  stroke: #888;
  stroke-width: 1;
}
.middle-c-marker ellipse {
  fill: #444;
}

/* Staff strip (scrolls with keys) */
.piano-wrap { 
  width: 100%;
  overflow-x: auto;
  padding: 8px 0 20px;
}

.staff-strip {
  position: relative;
  margin: 0 auto 8px;
  height: 46px;
  width: max-content;
  /* 5 staff lines */
  background:
    linear-gradient(#0000, #0000),
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 7px,
      rgba(255,255,255,0.18) 7px,
      rgba(255,255,255,0.18) 8px
    );
  /* shift lines so there are exactly 5 visible lines in the center band */
  background-size: 100% 46px;
  background-position: 0 6px;
  border-radius: 8px;
}

.treble-clef{
  position: absolute;
  left: 10px;
  top: 2px;
  font-size: 34px;
  line-height: 1;
  color: rgba(255,255,255,0.55);
  pointer-events: none;
  user-select: none;
}

.staff-notes{
  position: relative;
  height: 46px;
  width: 100%;
}

.c-marker{
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  pointer-events: none;
  user-select: none;
}

.c-marker .tick{
  position: absolute;
  left: 50%;
  top: 6px;
  width: 0;
  height: 34px;
  border-left: 1px solid rgba(255,255,255,0.12);
  transform: translateX(-50%);
}

.c-marker .label{
  position: absolute;
  left: 50%;
  top: 0px;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 0.3px;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
}

.c-marker.middle .label{
  color: rgba(255,255,255,0.92);
  font-weight: 700;
}

.c-marker.middle .note{
  position: absolute;
  left: 50%;
  top: 26px; /* place on a ledger-ish line below staff */
  transform: translateX(-50%);
}
.c-marker.middle svg line { stroke: rgba(255,255,255,0.55); stroke-width: 1; }
.c-marker.middle svg ellipse { fill: rgba(255,255,255,0.85); }

/* 7 rows: Do, Re, Mi, Fa, Sol, La, Ti */
.hand-do  { background-position-y: 0%; }
.hand-re  { background-position-y: 16.666%; }
.hand-mi  { background-position-y: 33.333%; }
.hand-fa  { background-position-y: 50%; }
.hand-sol { background-position-y: 66.666%; }
.hand-la  { background-position-y: 83.333%; }
.hand-ti  { background-position-y: 100%; }

.hand-syl {
  font-weight: 800;
  letter-spacing: 0.2px;
  color: rgba(255,255,255,0.95);
  font-size: 16px;
}


  .piano, .white-key, .black-key, .key-label, .hand-tile, .hand-syl, .controls, select, button, label {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }
/* Hand sign display: large, centered, and persistent space */
.hands-live{ margin: 14px auto 24px; max-width: 980px; padding: 0 12px; }
.hands-live-inner{
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  padding: 12px 12px 14px;
  min-height: 260px;
  display:flex; flex-direction:column;
}
.hands-live-title{ font-weight: 800; color: rgba(255,255,255,0.92); margin-bottom: 10px; text-align:center; }
.hands-live-content{ display:flex; gap: 14px; flex-wrap:wrap; justify-content:center; align-items:center; flex:1; }
.hands-live-placeholder{ color: rgba(255,255,255,0.70); font-size: 14px; text-align:center; max-width: 420px; }
.hand-tile{
  width: clamp(200px, 30vw, 300px);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  padding: 14px 14px 16px;
  display:flex; flex-direction:column; align-items:center; gap: 10px;
}
.hand-img{
  width: clamp(170px, 26vw, 260px);
  height: clamp(170px, 26vw, 260px);
  border-radius: 16px;
  background: #fff;
  object-fit: contain;
}
.hand-label{ font-size: clamp(24px, 3.2vw, 36px); font-weight: 900; color: rgba(255,255,255,0.96); }

/* Disable text selection/callout across the app (touch-heavy UI) */
html, body, * {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}
/* Prevent double-tap zoom on interactive elements */
button, select, .white-key, .black-key, .piano, #scrollWrap {
  touch-action: manipulation;
}

</style>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null;
let masterComp = null;
let masterGain = null;

function getMaster() {
  const ac = getCtx();
  if (!masterComp) {
    masterComp = ac.createDynamicsCompressor();
    masterGain = ac.createGain();
    masterGain.gain.setValueAtTime(0.9, ac.currentTime);
    masterComp.connect(masterGain);
    masterGain.connect(ac.destination);
  }
  return { ac, masterComp, masterGain };
}


function getCtx() {
  if (!ctx) ctx = new AudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}


// iOS/Safari audio "unlock": first audio often won't play unless the AudioContext is resumed
// inside a direct user gesture. We'll resume and do a tiny silent warm-up on first touch/click.
let audioUnlocked = false;
async function unlockAudioOnce() {
  if (audioUnlocked) return;
  const ac = getCtx();
  try {
    if (ac.state === 'suspended') await ac.resume();
    // Warm up: very short, near-silent oscillator (prevents first-note dropouts on some iOS versions)
    const o = ac.createOscillator();
    const g = ac.createGain();
    g.gain.setValueAtTime(0.00001, ac.currentTime);
    o.connect(g);
    g.connect(ac.destination);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + 0.02);
    audioUnlocked = true;
  } catch (e) {
    // If resume fails, we'll try again on next gesture.
  }
}

// Attach once: first pointer interaction unlocks audio reliably.
document.addEventListener('pointerdown', () => { unlockAudioOnce(); }, { once: true, passive: false });
document.addEventListener('touchstart', () => { unlockAudioOnce(); }, { once: true, passive: false });
document.addEventListener('mousedown', () => { unlockAudioOnce(); }, { once: true, passive: true });
function ensureAudioRunning() {
  const ac = getCtx();
  if (ac.state !== 'running') {
    ac.resume().then(() => { audioUnlocked = true; }).catch(() => {});
  }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) ensureAudioRunning(); });
window.addEventListener('pageshow', () => { ensureAudioRunning(); });
document.addEventListener('pointerdown', () => { ensureAudioRunning(); }, { passive: true });

// iOS Safari: prevent double-tap zoom when tapping keys quickly
(function preventDoubleTapZoom() {
  const area = document.getElementById('scrollWrap') || document.body;
  let lastTouchEnd = 0;
  area.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
})();

// 88 keys: A0 (MIDI 21) to C8 (MIDI 108)
const MIDI_START = 21;
const MIDI_END = 108;
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_BLACK = [false,true,false,true,false,false,true,false,true,false,true,false];

// Solfège syllables
// Prefer sharps (what this file originally did)
const SOL_SHARP = ['Do','Di','Re','Ri','Mi','Fa','Fi','Sol','Si','La','Li','Ti'];

// Prefer flats (enharmonic spellings)
const SOL_FLAT  = ['Do','Ra','Re','Me','Mi','Fa','Se','Sol','Le','La','Te','Ti'];

// Fixed Do syllables (C = Do always, with sharps/flats preference)

let accidentalMode = 'flat'; // sharp | flat | both

let tonic = 0; // semitone offset for C
let displayMode = 'solfege'; // solfege | fixed | note

const KEY_DATA = {
  // Major
  'C:maj':  { tonic: 0,  sigType: 'none',  sigCount: 0, label: 'C Major' },
  'G:maj':  { tonic: 7,  sigType: 'sharp', sigCount: 1, label: 'G Major' },
  'D:maj':  { tonic: 2,  sigType: 'sharp', sigCount: 2, label: 'D Major' },
  'A:maj':  { tonic: 9,  sigType: 'sharp', sigCount: 3, label: 'A Major' },
  'E:maj':  { tonic: 4,  sigType: 'sharp', sigCount: 4, label: 'E Major' },
  'B:maj':  { tonic: 11, sigType: 'sharp', sigCount: 5, label: 'B Major' },
  'F#:maj': { tonic: 6,  sigType: 'sharp', sigCount: 6, label: 'F# Major' },
  'C#:maj': { tonic: 1,  sigType: 'sharp', sigCount: 7, label: 'C# Major' },
  'F:maj':  { tonic: 5,  sigType: 'flat',  sigCount: 1, label: 'F Major' },
  'Bb:maj': { tonic: 10, sigType: 'flat',  sigCount: 2, label: 'Bb Major' },
  'Eb:maj': { tonic: 3,  sigType: 'flat',  sigCount: 3, label: 'Eb Major' },
  'Ab:maj': { tonic: 8,  sigType: 'flat',  sigCount: 4, label: 'Ab Major' },
  'Db:maj': { tonic: 1,  sigType: 'flat',  sigCount: 5, label: 'Db Major' },
  'Gb:maj': { tonic: 6,  sigType: 'flat',  sigCount: 6, label: 'Gb Major' },

  'A:min':  { tonic: 9,  sigType: 'none',  sigCount: 0, label: 'A Minor' },
  'E:min':  { tonic: 4,  sigType: 'sharp', sigCount: 1, label: 'E Minor' },
  'B:min':  { tonic: 11, sigType: 'sharp', sigCount: 2, label: 'B Minor' },
  'F#:min': { tonic: 6,  sigType: 'sharp', sigCount: 3, label: 'F# Minor' },
  'C#:min': { tonic: 1,  sigType: 'sharp', sigCount: 4, label: 'C# Minor' },
  'G#:min': { tonic: 8,  sigType: 'sharp', sigCount: 5, label: 'G# Minor' },

  'A#:min': { tonic: 10, sigType: 'sharp', sigCount: 7, label: 'A# Minor' },

  'D:min':  { tonic: 2,  sigType: 'flat',  sigCount: 1, label: 'D Minor' },
  'G:min':  { tonic: 7,  sigType: 'flat',  sigCount: 2, label: 'G Minor' },
  'C:min':  { tonic: 0,  sigType: 'flat',  sigCount: 3, label: 'C Minor' },
  'F:min':  { tonic: 5,  sigType: 'flat',  sigCount: 4, label: 'F Minor' },
  'Bb:min': { tonic: 10, sigType: 'flat',  sigCount: 5, label: 'Bb Minor' },
  'Eb:min': { tonic: 3,  sigType: 'flat',  sigCount: 6, label: 'Eb Minor' },

function getSelectedKeyData() {
  const v = document.getElementById('tonicSelect').value;
  return KEY_DATA[v] || KEY_DATA['C:maj'];
}

function getLabel(midi) {
  const semitone = midi % 12;
  const noteName = NOTE_NAMES[semitone];
  const oct = Math.floor(midi / 12) - 1;

  if (displayMode === 'note') return noteName + oct;

  // Helper to format sharp/flat/both
  const fmt = (sharpArr, flatArr, idx) => {
    if (accidentalMode === 'sharp') return sharpArr[idx];
    if (accidentalMode === 'flat') return flatArr[idx];

    // both: show pairs only for chromatic degrees that differ
    const s = sharpArr[idx];
    const f = flatArr[idx];
    return (s === f) ? s : `${s}/${f}`;
  };
  // movable do
  const deg = ((semitone - tonic) % 12 + 12) % 12;
  return fmt(SOL_SHARP, SOL_FLAT, deg);
}



const activeMidi = new Set();
let handsClearTimer = null;

function getSolfegeSyllableForMidi(midi) {
  // Always return solfège for the hand-sign area (even if user is viewing note names)
  const semitone = midi % 12;
  const deg = ((semitone - tonic) % 12 + 12) % 12;

  // same formatter used in getLabel:
  const fmt = (sharpArr, flatArr, idx) => {
    if (accidentalMode === 'sharp') return sharpArr[idx];
    if (accidentalMode === 'flat') return flatArr[idx];
    const s = sharpArr[idx];
    const f = flatArr[idx];
    return (s === f) ? s : `${s}/${f}`;
  };
  return fmt(SOL_SHARP, SOL_FLAT, deg);
}

function handClassForDegree(deg) {
  // Map chromatic degrees to the nearest "base" Curwen hand sign:
  // 0 Do
  // 1 Di/Ra -> Do
  // 2 Re
  // 3 Ri/Me -> Re
  // 4 Mi
  // 5 Fa
  // 6 Fi/Se -> Fa
  // 7 Sol
  // 8 Si/Le -> Sol
  // 9 La
  // 10 Li/Te -> La
  // 11 Ti
  const base =
    (deg === 0 || deg === 1) ? 'do' :
    (deg === 2 || deg === 3) ? 're' :
    (deg === 4) ? 'mi' :
    (deg === 5 || deg === 6) ? 'fa' :
    (deg === 7 || deg === 8) ? 'sol' :
    (deg === 9 || deg === 10) ? 'la' :
    'ti';
  return 'hand-' + base;
}

function renderHandSigns(forceClear=false) {
  const wrap = document.getElementById('handsLiveContent');
  const ph = document.getElementById('handsPlaceholder');
  if (!wrap) return;

  const midis = Array.from(activeMidi).sort((a,b)=>a-b);

  // If no notes are currently held:
  // - keep the last shown hand sign(s) visible
  // - only clear to placeholder after 20 seconds (or when forceClear is true)
  if (midis.length === 0) {
    if (forceClear) {
      wrap.querySelectorAll('.hand-tile').forEach(n => n.remove());
      if (ph) ph.style.display = 'block';
    }
    return;
  }

  // Notes are held: cancel any pending clear and render fresh
  if (handsClearTimer) { clearTimeout(handsClearTimer); handsClearTimer = null; }

  // clear existing tiles
  wrap.querySelectorAll('.hand-tile').forEach(n => n.remove());
  if (ph) ph.style.display = 'none';

  for (const m of midis) {
    const semitone = m % 12;
    const deg = ((semitone - tonic) % 12 + 12) % 12;

    const tile = document.createElement('div');
    tile.className = 'hand-tile';

    const icon = document.createElement('div');
    icon.className = 'hand-icon ' + handClassForDegree(deg);

    const syl = document.createElement('div');
    syl.className = 'hand-syl';
    syl.textContent = getSolfegeSyllableForMidi(m);

    tile.appendChild(icon);
    tile.appendChild(syl);
    wrap.appendChild(tile);
  }
}

const activeOscillators = {};

function playNote(midi, retry=0) {
  const MIN_RING = 0.9; // seconds: audible even on quick tap
  const RELEASE = 1.4;  // seconds: longer tail

  try { ensureAudioRunning(); } catch {}
  try { unlockAudioOnce(); } catch {}
  // If iOS hasn't resumed audio yet, retry shortly.
  try {
    const ac = getCtx();
    if (ac.state !== 'running') {
      if (retry < 3) {
        ac.resume?.();
        setTimeout(() => playNote(midi, retry + 1), 60);
      }
      return;
    }
  } catch {}
  // If the same note is retriggered rapidly, stop the previous instance to avoid piling up nodes.
  if (activeOscillators[midi]) stopNote(midi);

  const { ac, masterComp } = getMaster();
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  // Ensure audio is unlocked/resumed before scheduling oscillators (iOS)
  if (!audioUnlocked) { unlockAudioOnce(); }
  const startAt = (ac.state === 'running') ? ac.currentTime : (ac.currentTime + 0.03);

  const osc = ac.createOscillator();
  const gain = ac.createGain();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, startAt);

  // Add slight harmonic
  const osc2 = ac.createOscillator();
  const gain2 = ac.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2, startAt);
  gain2.gain.setValueAtTime(0.08, startAt);
  osc2.connect(gain2);
  gain2.connect(gain);

  // Envelope
  gain.gain.setValueAtTime(0.0001, startAt);
  gain.gain.linearRampToValueAtTime(0.28, startAt + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startAt + RELEASE);

  // Routing: per-note gain -> shared compressor -> master gain -> destination
  gain.connect(masterComp);
  osc.connect(gain);

  // Start/stop
  osc.start(startAt);
  osc2.start(startAt);
  osc.stop(startAt + Math.max(MIN_RING, RELEASE + 0.2));
  osc2.stop(startAt + Math.max(MIN_RING, RELEASE + 0.2));

  activeOscillators[midi] = { osc, gain, osc2, gain2, startAt, minRing: MIN_RING, release: RELEASE };

  // Cleanup when oscillators end (prevents random audio dropouts from node buildup)
  const cleanup = () => {
    if (activeOscillators[midi] && activeOscillators[midi].osc === osc) {
      delete activeOscillators[midi];
    }
    try { osc.disconnect(); } catch {}
    try { osc2.disconnect(); } catch {}
    try { gain2.disconnect(); } catch {}
    try { gain.disconnect(); } catch {}
  };
  osc.addEventListener('ended', cleanup, { once: true });
}


function stopNote(midi) {
  const entry = activeOscillators[midi];
  if (!entry) return;
  delete activeOscillators[midi];

  const { ac } = getMaster();
  const now = ac.currentTime;

  const startAt = (typeof entry.startAt === 'number') ? entry.startAt : now;
  const minRing = (typeof entry.minRing === 'number') ? entry.minRing : 0.9;
  const rel = (typeof entry.release === 'number') ? entry.release : 1.4;

  // Don't cut off immediately on quick taps — keep it sounding at least minRing seconds.
  const releaseAt = Math.max(now, startAt + minRing);

  try {
    entry.gain.gain.cancelScheduledValues(releaseAt);
    // Hold current level until releaseAt, then decay smoothly.
    const current = Math.max(entry.gain.gain.value, 0.0001);
    entry.gain.gain.setValueAtTime(current, releaseAt);
    entry.gain.gain.exponentialRampToValueAtTime(0.0001, releaseAt + rel);
  } catch {}

  // Stop oscillators after the release tail.
  const stopAt = releaseAt + rel + 0.05;
  try { entry.osc.stop(stopAt); } catch {}
  try { entry.osc2.stop(stopAt); } catch {}

  // Disconnect shortly after stop to prevent node buildup
  setTimeout(() => {
    try { entry.osc.disconnect(); } catch {}
    try { entry.osc2.disconnect(); } catch {}
    try { entry.gain2.disconnect(); } catch {}
    try { entry.gain.disconnect(); } catch {}
  }, Math.max(140, (stopAt - now) * 1000 + 60));
}


// Build piano
const pianoEl = document.getElementById('piano');
let whiteIndex = 0;
const keyEls = {}; // midi -> element

// We'll render white keys as flex, black keys absolutely positioned
// Track white key positions
const whiteKeys = [];
const blackKeys = [];

for (let m = MIDI_START; m <= MIDI_END; m++) {
  const sem = m % 12;
  const isBlack = IS_BLACK[sem];
  if (!isBlack) whiteKeys.push(m);
  else blackKeys.push(m);
}

// Create container with relative positioning
const container = document.createElement('div');
container.style.position = 'relative';
container.style.display = 'flex';
pianoEl.appendChild(container);

// White keys
const whiteKeyEls = {};
whiteKeys.forEach((m, i) => {
  const el = document.createElement('div');
  el.className = 'white-key';
  el.dataset.midi = m;
  
  const sem = m % 12;
  const oct = Math.floor(m / 12) - 1;
  
  // Octave label on C
  if (sem === 0) {
    const ol = document.createElement('span');
    ol.className = 'octave-label';
    ol.textContent = oct;
    el.appendChild(ol);
  }
  const lbl = document.createElement('div');
  lbl.className = 'key-label';
  lbl.textContent = getLabel(m);
  el.appendChild(lbl);
  
  attachPointerHandlers(el, m);
  container.appendChild(el);
  whiteKeyEls[m] = el;
  keyEls[m] = el;
});

// Black keys — positioned absolutely
// We need to know each white key's pixel position
// Each white key is 34px wide
const WHITE_W = 34;
const BLACK_W = 22;

// Map: for each black key midi, find its visual position
// Between which two white keys does it sit?
blackKeys.forEach(m => {
  const sem = m % 12;
  // Find the white key index just before this black key
  // White keys up to this midi
  const whitesBefore = whiteKeys.filter(wm => wm < m).length;
  const leftPos = whitesBefore * WHITE_W - BLACK_W / 2;
  
  const el = document.createElement('div');
  el.className = 'black-key';
  el.dataset.midi = m;
  el.style.left = leftPos + 'px';
  el.style.top = '0';
  el.style.position = 'absolute';
  
  const lbl = document.createElement('div');
  lbl.className = 'key-label';
  lbl.textContent = getLabel(m);
  el.appendChild(lbl);
  
  attachPointerHandlers(el, m);
  container.appendChild(el);
  keyEls[m] = el;
});

// Set container width
container.style.width = (whiteKeys.length * WHITE_W) + 'px';
container.style.height = '160px';
/* ===== Staff strip markers (treble clef) =====
   Goal: give a clear, scrolling reference for octave changes and Middle C.
   We mark every C with an octave label (C1, C2, ...), and highlight Middle C (C4).
*/
const staffStrip = document.getElementById('staffStrip');
const staffNotes = document.getElementById('staffNotes');

function buildStaffMarkers() {
  // Match staff width to the keyboard width
  staffStrip.style.width = (whiteKeys.length * WHITE_W) + 'px';

  // Clear existing markers
  staffNotes.innerHTML = '';

  // Find each C (white key) and place a marker at its center
  whiteKeys.forEach((m, wi) => {
    if ((m % 12) !== 0) return; // C only
    const oct = Math.floor(m / 12) - 1; // MIDI octave
    const x = wi * WHITE_W + (WHITE_W / 2);

    const marker = document.createElement('div');
    marker.className = 'c-marker' + (m === 60 ? ' middle' : '');
    marker.style.left = x + 'px';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = (m === 60) ? 'Middle C (C4)' : `C${oct}`;

    const tick = document.createElement('div');
    tick.className = 'tick';

    marker.appendChild(label);
    marker.appendChild(tick);

    // Add a tiny ledger-line notehead for Middle C only (subtle but clear)
    if (m === 60) {
      const noteWrap = document.createElement('div');
      noteWrap.className = 'note';
      noteWrap.innerHTML = `
        <svg width="44" height="18" viewBox="0 0 44 18" aria-hidden="true">
          <line x1="6" x2="38" y1="10" y2="10"></line>
          <ellipse cx="22" cy="10" rx="7" ry="4.6"></ellipse>
        </svg>
      `;
      marker.appendChild(noteWrap);
    }

    staffNotes.appendChild(marker);
  });
}

buildStaffMarkers();

function triggerKey(midi, on) {
  const el = keyEls[midi];
  if (!el) return;
  if (on) {
    el.classList.add('active');
    activeMidi.add(midi);
  if (handsClearTimer) { clearTimeout(handsClearTimer); handsClearTimer = null; }
  renderHandSigns();
    playNote(midi);
  } else {
    el.classList.remove('active');
    activeMidi.delete(midi);
  renderHandSigns();
  if (activeMidi.size === 0) {
    if (handsClearTimer) clearTimeout(handsClearTimer);
    handsClearTimer = setTimeout(()=>{ renderHandSigns(true); }, 20000);
  }
    stopNote(midi);
  }
}

// ===== Polyphonic multi-touch support (pointer events) =====
const pointerToMidi = new Map();

function attachPointerHandlers(el, midi) {
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    // iOS Safari: audio must be resumed directly inside the user gesture (no await)
    try { unlockAudioOnce(); } catch {}
    try { ensureAudioRunning(); } catch {}

    try { el.setPointerCapture(e.pointerId); } catch {}
    pointerToMidi.set(e.pointerId, midi);
    triggerKey(midi, true);

    const end = (ev) => {
      if (ev.pointerId !== e.pointerId) return;
      const m = pointerToMidi.get(ev.pointerId);
      if (m !== undefined) triggerKey(m, false);
      pointerToMidi.delete(ev.pointerId);
      try { el.releasePointerCapture(ev.pointerId); } catch {}
      window.removeEventListener('pointerup', end);
      window.removeEventListener('pointercancel', end);
      window.removeEventListener('pointerout', end);
      window.removeEventListener('blur', blurEnd);
    };

    const blurEnd = () => {
      const m = pointerToMidi.get(e.pointerId);
      if (m !== undefined) triggerKey(m, false);
      pointerToMidi.delete(e.pointerId);
      window.removeEventListener('pointerup', end);
      window.removeEventListener('pointercancel', end);
      window.removeEventListener('pointerout', end);
    };

    window.addEventListener('pointerup', end);
    window.addEventListener('pointercancel', end);
    window.addEventListener('pointerout', end);
    window.addEventListener('blur', blurEnd, { once: true });
  });

  el.addEventListener('pointercancel', (e) => {
    const m = pointerToMidi.get(e.pointerId);
    if (m !== undefined) triggerKey(m, false);
    pointerToMidi.delete(e.pointerId);
  });
}

function updateLabels() {
  for (let m = MIDI_START; m <= MIDI_END; m++) {
    const el = keyEls[m];
    if (!el) continue;
    const lbl = el.querySelector('.key-label');
    if (lbl) lbl.textContent = getLabel(m);
  }
}

// Key selector (major/minor)
document.getElementById('tonicSelect').addEventListener('change', e => {
  const kd = getSelectedKeyData();
  tonic = kd.tonic;

  // Default accidentals display to BOTH whenever key changes
  const pref = (kd.sigType === 'sharp') ? 'sharp' : (kd.sigType === 'flat') ? 'flat' : 'both';
  accidentalMode = pref;
  document.getElementById('accSelect').value = pref;

  updateKeySigPreview();
  updateLabels();
  renderHandSigns();
});

// Accidentals selector (sharp/flat/both)
document.getElementById('accSelect').addEventListener('change', e => {
  accidentalMode = e.target.value; // sharp | flat | both
  updateLabels();
});


// Key signature preview (treble clef)
const keySigTreble = document.getElementById('keySigTreble');
const keySigBass = document.getElementById('keySigBass');

function clearSvg(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}

// Y positions for accidentals on treble staff (approx; looks like normal sheet music)
const SHARP_ORDER = ['F','C','G','D','A','E','B'];
const FLAT_ORDER  = ['B','E','A','D','G','C','F'];

// Map pitch letter to y coordinate on our staff (top line to bottom line)
/*
  Y positions for key-signature accidentals on a treble staff.
  Staff lines are at y = 18, 26, 34, 42, 50 (top to bottom).
*/
const SHARP_Y = [17, 29, 21, 25, 37, 49, 33]; // F C G D A E B (treble positions)
const FLAT_Y  = [33, 21, 37, 25, 41, 29, 17]; // B E A D G C F (treble positions) // B E A D G C F (order)
/* Bass clef key-signature positions (approx. standard engraving layout). */
const BASS_SHARP_Y = [26, 38, 30, 42, 34, 46, 26]; // F C G D A E B (bass positions)
const BASS_FLAT_Y  = [42, 30, 46, 34, 50, 38, 26]; // B E A D G C F (bass positions)


function updateKeySigPreview() {
  const kd = getSelectedKeyData();
  clearSvg(keySigTreble);
  clearSvg(keySigBass);

  const drawStaff = (svg, clefGlyph, showLabel) => {
    // Draw staff lines
    const x0 = 10, x1 = 170;
    const lines = [18, 26, 34, 42, 50];
    for (const y of lines) {
      svg.appendChild(svgEl('line', { x1: x0, y1: y, x2: x1, y2: y, class: 'staff-line' }));
    }

    // Clef
    const clef = svgEl('text', { x: 16, y: 55, class: 'clef' });
    clef.textContent = clefGlyph;
    svg.appendChild(clef);

    if (showLabel) {
      const label = svgEl('text', { x: 12, y: 14, class: 'keylabel' });
      label.textContent = kd.label;
      svg.appendChild(label);
    }

    // Accidentals
    const accType = kd.sigType;
    const count = kd.sigCount;
    if (accType === 'none' || count === 0) return;

    const glyph = accType === 'sharp' ? '♯' : '♭';
    const yList = (svg === keySigTreble)
      ? (accType === 'sharp' ? SHARP_Y : FLAT_Y)
      : (accType === 'sharp' ? BASS_SHARP_Y : BASS_FLAT_Y);

    let x = 82; // after clef
    for (let i = 0; i < count; i++) {
      const y = yList[i];
      const t = svgEl('text', { x: x, y: y, class: 'acc' });
      t.textContent = glyph;
      svg.appendChild(t);
      x += 14;
    }
  };

  drawStaff(keySigTreble, '𝄞', true);
  drawStaff(keySigBass, '𝄢', false);
}


// Auto-select accidentals based on the chosen tonic on initial loadupdateLabels();

// Mode buttons
const btnSolfege = document.getElementById('btnSolfege');
const btnNote = document.getElementById('btnNote');

function setMode(mode) {
  displayMode = mode;
  btnSolfege.classList.toggle('active', mode === 'solfege');  btnNote.classList.toggle('active', mode === 'note');
  updateLabels();
}
btnSolfege.addEventListener('click', () => setMode('solfege'));
btnNote.addEventListener('click', () => setMode('note'));

// Keyboard mapping — middle octave (C4 = MIDI 60)
const KB_MAP = {
  'a': 60, // C4
  'w': 61, // C#4
  's': 62, // D4
  'e': 63, // D#4
  'd': 64, // E4
  'f': 65, // F4
  't': 66, // F#4
  'g': 67, // G4
  'y': 68, // G#4
  'h': 69, // A4
  'u': 70, // A#4
  'j': 71, // B4
  'k': 72, // C5
  'o': 73, // C#5
  'l': 74, // D5
  'p': 75, // D#5
  ';': 76, // E5
  "'": 77, // F5
};

const heldKeys = new Set();
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const midi = KB_MAP[e.key];
  if (midi !== undefined) {
    heldKeys.add(e.key);
    triggerKey(midi, true);
  }
});
document.addEventListener('keyup', e => {
  const midi = KB_MAP[e.key];
  if (midi !== undefined) {
    heldKeys.delete(e.key);
    triggerKey(midi, false);
  }
});

// Initialize defaults on load
(function initDefaults() {
  // Default to C Major unless user changed the HTML default selection
  const kd = getSelectedKeyData();
  tonic = kd.tonic;

  const pref = (kd.sigType === 'sharp') ? 'sharp' : (kd.sigType === 'flat') ? 'flat' : 'both';
  accidentalMode = pref;
  document.getElementById('accSelect').value = pref;

  updateKeySigPreview();
  updateLabels();
})();

// Scroll to middle C on load
setTimeout(() => {
  const middleCWhiteIdx = whiteKeys.indexOf(60);
  const scrollTarget = middleCWhiteIdx * WHITE_W - window.innerWidth / 2 + WHITE_W * 4;
  document.getElementById('scrollWrap').scrollLeft = Math.max(0, scrollTarget);
}, 100);
// iOS: prevent double-tap zoom while practicing
(function preventDefaultDblClickZoom(){
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
})();

// iOS audio warmup: ensure AudioContext is running on first touch (reduces "needs 3 taps" issue)
(function setupIosAudioWarmup(){
  const warm = (e) => {
    try { unlockAudioOnce(); } catch {}
    try { ensureAudioRunning(); } catch {}
    try {
      const ac = getCtx();
      if (ac && ac.state !== 'running') ac.resume?.();
      // silent tick
      const o = ac.createOscillator();
      const g = ac.createGain();
      g.gain.value = 0.00001;
      o.connect(g); g.connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + 0.03);
    } catch {}
    document.removeEventListener('touchstart', warm, true);
    document.removeEventListener('mousedown', warm, true);
  };
  document.addEventListener('touchstart', warm, true);
  document.addEventListener('mousedown', warm, true);
})();


});

// Center keyboard on Middle C (C4, MIDI 60) at load
function centerOnMiddleC(force=false) {
  const wrap = document.getElementById('scrollWrap');
  if (!wrap) return;
  const middle = wrap.querySelector('[data-midi="60"]');
  if (!middle) return;

  // Use offsetLeft for stable positioning within the scroll container
  const targetCenter = middle.offsetLeft + middle.offsetWidth / 2;
  const viewportCenter = wrap.clientWidth / 2;
  const desired = Math.max(0, targetCenter - viewportCenter);

  // Avoid fighting the user if they've already scrolled
  if (!force && Math.abs(wrap.scrollLeft - desired) < 6) return;

  wrap.scrollTo({ left: desired, behavior: 'instant' });
}

function centerOnMiddleCWhenReady() {
  // Wait for layout/keys to exist
  let tries = 0;
  const tick = () => {
    tries++;
    const wrap = document.getElementById('scrollWrap');
    const middle = wrap && wrap.querySelector('[data-midi="60"]');
    if (wrap && middle) {
      centerOnMiddleC(true);
      return;
    }
    if (tries < 40) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

window.addEventListener('load', () => {
  // Run a couple times to handle late layout (fonts / iOS viewport)
  centerOnMiddleCWhenReady();
  setTimeout(() => centerOnMiddleC(true), 150);
  setTimeout(() => centerOnMiddleC(true), 450);
});
</script>
